# Dependabot keeps dependencies up to date by opening pull requests when new
# versions are released. Free for all repositories. Docs:
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Update npm dependencies (dependencies / devDependencies / peerDependencies in package.json).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: deps
      include: scope
    # Keep Pi package updates together so pi-mmr follows one Pi dependency set.
    groups:
      pi-agent-stack:
        patterns:
          - "@earendil-works/pi-*"
      npm-minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Runtime schema dependency: keep in sync with @earendil-works/pi-coding-agent.
      - dependency-name: "typebox"

  # Update versions of GitHub Actions used in workflows (uses: actions/...@vN).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope

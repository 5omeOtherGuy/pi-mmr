name: changelog-sync

# Extract a structured changelog block from a PR's body and append new
# bullets into CHANGELOG.md under `## Unreleased`. The workflow commits any
# resulting diff back to the PR's head branch as github-actions[bot].
#
# Why GITHUB_TOKEN is acceptable here:
#   GitHub-Actions writes signed with the default GITHUB_TOKEN do NOT trigger
#   downstream workflow runs by design (see GitHub docs:
#   https://docs.github.com/actions/security-guides/automatic-token-authentication#using-the-github_token-in-a-workflow
#   under "An action in a workflow run can't trigger a new workflow run"),
#   so this job cannot recurse into itself when it pushes a new commit.
#
# Why forks are skipped:
#   GITHUB_TOKEN is read-only on `pull_request` events from forks, so a push
#   back to the PR head branch would fail; the workflow exits cleanly and
#   contributors edit CHANGELOG.md manually instead.
#
# How to opt out:
#   Apply the `skip-changelog` label to the PR. The same label is already
#   honored by scripts/check-changelog.mjs / .github/release.yml for
#   deliberately non-user-visible PRs.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: changelog-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    # Skip:
    #   - Forks (GITHUB_TOKEN is read-only; push would fail).
    #   - PRs labeled `skip-changelog`.
    #   - PRs whose actor is github-actions[bot] (e.g. our own sync commit).
    if: >-
      github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
      && !contains(github.event.pull_request.labels.*.name, 'skip-changelog')
      && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Sync CHANGELOG.md from PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf '%s' "$PR_BODY" | node scripts/sync-changelog-from-pr.mjs

      - name: Commit and push CHANGELOG.md changes
        run: |
          if git diff --quiet CHANGELOG.md; then
            echo "No CHANGELOG.md changes to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add CHANGELOG.md
          git commit -m "chore(changelog): sync from PR #${{ github.event.pull_request.number }} body"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      # Close the gap the local notice-by-default policy leaves open: if an
      # agent forgot both the marker block and a direct edit, nothing else
      # enforces a changelog entry. This runs AFTER the sync commit, so a
      # marker-block PR already has CHANGELOG.md in its diff and passes. The
      # `skip-changelog` label / fork / bot cases are filtered by the job `if:`.
      - name: Require a changelog entry for monitored changes
        env:
          CHANGELOG_BASE_REF: ${{ github.event.pull_request.base.sha }}
        run: node scripts/require-changelog-entry.mjs

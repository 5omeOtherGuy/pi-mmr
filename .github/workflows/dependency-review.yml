name: Dependency Review

on:
  pull_request:
    branches: [main]

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: Review dependency changes
    # Private repositories need dependency review support enabled before this
    # action can inspect dependency diffs. Keep the workflow ready, but avoid a
    # failing required check when the feature is unavailable.
    if: ${{ github.event.repository.private == false || vars.ENABLE_GHAS_SCANS == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Review dependency diff
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
